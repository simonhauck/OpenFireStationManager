spring:
  application:
    name: OpenFireStationManager
  datasource:
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ofsm}

server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        name: OFSM_AUTH
        http-only: true
        secure: true
        same-site: strict

app:
  remember-me:
    key: ${REMEMBER_ME_KEY:change-me-in-prod}
    token-validity: ${REMEMBER_ME_TOKEN_VALIDITY:P30D}
    token-name: ${server.servlet.session.cookie.name}_REMEMBER_ME

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
    path: /schema.json
