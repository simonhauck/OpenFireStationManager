services:
  app:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    network_mode: host
    volumes:
      - ..:/workspace:cached
    command: sleep infinity

  db:
    image: postgres:18
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ofsm
